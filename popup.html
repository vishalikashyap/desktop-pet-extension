<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Desktop Pet</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>Desktop Pet</h1>

    <label class="dp-row">
      <span>Enabled</span>
      <input type="checkbox" id="enabled" />
    </label>

    <div class="dp-section">
      <div class="dp-label">Pet</div>
      <div class="dp-pets" id="pets"></div>
    </div>

    <div class="dp-section">
      <div class="dp-label">Position</div>
      <select id="positionMode">
        <option value="bottom-left">Bottom left</option>
        <option value="bottom-right">Bottom right</option>
        <option value="top-left">Top left</option>
        <option value="top-right">Top right</option>
        <option value="free">Free drag anywhere</option>
      </select>
    </div>

    <div class="dp-section">
      <div class="dp-label">Walk direction</div>
      <select id="walkDirection">
        <option value="random">Random</option>
        <option value="ltr">Left → Right</option>
        <option value="rtl">Right → Left</option>
      </select>
    </div>

    <div class="dp-section">
      <div class="dp-label">Size</div>
      <div class="dp-segmented" id="size">
        <button data-value="small">Small</button>
        <button data-value="medium">Medium</button>
        <button data-value="large">Large</button>
      </div>
    </div>

    <div class="dp-section">
      <div class="dp-row-tight">
        <span>Animation speed</span>
        <span class="dp-value" id="animationSpeedValue">1.0x</span>
      </div>
      <input type="range" id="animationSpeed" min="0.5" max="2" step="0.1" />
    </div>

    <div class="dp-section">
      <div class="dp-row-tight">
        <span>Opacity</span>
        <span class="dp-value" id="opacityValue">100%</span>
      </div>
      <input type="range" id="opacity" min="0.4" max="1" step="0.05" />
    </div>

    <label class="dp-row">
      <span>Sound</span>
      <input type="checkbox" id="soundEnabled" />
    </label>

    <label class="dp-row">
      <span>Always on top</span>
      <input type="checkbox" id="alwaysOnTop" />
    </label>

    <div class="dp-section">
      <div class="dp-label">Theme</div>
      <select id="theme">
        <option value="auto">Auto</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>
    </div>

    <label class="dp-row">
      <span>Speech bubbles</span>
      <input type="checkbox" id="speechEnabled" />
    </label>

    <div class="dp-section">
      <div class="dp-label">Speech frequency</div>
      <select id="speechFrequency">
        <option value="rare">Rare</option>
        <option value="normal">Normal</option>
        <option value="frequent">Frequent</option>
      </select>
    </div>

    <button class="dp-reset" id="reset">Reset to defaults</button>

    <p class="dp-hint">Reload open tabs to see changes.</p>

    <script src="pet-rig.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
